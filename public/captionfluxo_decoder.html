
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;600;700&family=Noto+Sans+Devanagari:wght@700&family=Noto+Sans+Telugu:wght@700&family=Noto+Sans+Tamil:wght@700&family=Noto+Sans+Malayalam:wght@700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
.app{width:100%;background:#141414;border-radius:10px;overflow:hidden;font-family:'Inter',sans-serif;border:1px solid #2a2a2a;}
.titlebar{background:#1c1c1c;padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #222;}
.dot{width:11px;height:11px;border-radius:50%;}.dot.r{background:#ff5f57;}.dot.y{background:#febc2e;}.dot.g{background:#28c840;}
.tbar-mid{margin:0 auto;font-size:12px;color:#555;font-family:'Share Tech Mono',monospace;}
.preview{position:relative;background:#0f1a14;height:280px;display:flex;align-items:center;justify-content:center;overflow:hidden;border-bottom:1px solid #1a1a1a;}
.preview-bg{position:absolute;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,#1a3d2a 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);opacity:.5;}
.rec-badge{position:absolute;top:14px;left:16px;font-size:11px;color:#aaa;font-family:'Share Tech Mono',monospace;display:flex;align-items:center;gap:6px;}
.rec-dot{width:7px;height:7px;border-radius:50%;background:#e74c3c;animation:recblink 1.2s step-end infinite;}
@keyframes recblink{50%{opacity:0;}}
.lang-badge{position:absolute;top:12px;right:16px;background:transparent;border:1.5px solid #2ecc71;border-radius:20px;padding:4px 14px;font-size:12px;color:#2ecc71;font-family:'Share Tech Mono',monospace;display:flex;align-items:center;gap:6px;}
.lang-dot{width:6px;height:6px;border-radius:50%;background:#2ecc71;}
.caption-area{position:absolute;bottom:44px;left:0;right:0;display:flex;justify-content:center;}
.caption-text{font-size:28px;font-weight:700;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.8);letter-spacing:1px;min-height:40px;text-align:center;padding:0 24px;}
.progress-bars{position:absolute;bottom:0;left:0;right:0;display:flex;gap:4px;padding:6px 10px;}
.pbar-seg{height:3px;border-radius:2px;background:#2ecc71;opacity:.85;}
.pbar-seg.dim{opacity:.3;background:#555;}
.pbar-active{height:3px;border-radius:2px;background:#2ecc71;transition:width .1s linear;}

.timeline-header{display:flex;padding:10px 16px 6px;font-size:11px;color:#444;font-family:'Share Tech Mono',monospace;border-bottom:1px solid #1c1c1c;background:#111;}
.th-num{width:28px;}.th-src{flex:1;}.th-io{width:110px;text-align:right;}
.tl-rows{background:#111;}
.tl-row{display:flex;align-items:center;padding:8px 16px;border-bottom:1px solid #181818;gap:8px;transition:background .2s;}
.tl-row.active-row{background:#1a2820;}
.tl-num{width:20px;font-size:11px;color:#444;font-family:'Share Tech Mono',monospace;}
.tl-dot{width:8px;height:8px;border-radius:2px;background:#2ecc71;flex-shrink:0;}
.tl-t{width:14px;font-size:11px;color:#555;font-family:'Share Tech Mono',monospace;}
.tl-word{flex:1;font-size:13px;color:#ccc;font-family:'Share Tech Mono',monospace;}
.tl-row.active-row .tl-word{color:#fff;}
.tl-script{flex:1;font-size:14px;font-weight:700;}
.tl-io{width:110px;text-align:right;font-size:11px;color:#444;font-family:'Share Tech Mono',monospace;}

.timebar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:#0e0e0e;border-top:1px solid #1c1c1c;font-size:11px;color:#444;font-family:'Share Tech Mono',monospace;border-bottom:1px solid #1a1a1a;}
.clip-row{display:flex;gap:4px;padding:8px 10px;background:#0c0c0c;overflow:hidden;}
.clip{height:18px;border-radius:3px;background:#2ecc71;opacity:.75;flex:1;}
.clip.dim{background:#333;opacity:.5;}
.clip.active-clip{opacity:1;box-shadow:0 0 0 1px #2ecc71;}
</style>

<h2 class="sr-only">Caption Integrit-style app showing INTEGRITs decoding into Hindi, Telugu, Tamil, and Malayalam scripts with timeline rows</h2>

<div class="app">
  <div class="titlebar">
    <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="tbar-mid">caption Integrit · integrit_decode.aep</span>
    <span style="font-size:11px;color:#444;font-family:'Share Tech Mono',monospace;">After Effects 2024</span>
  </div>

  <div class="preview">
    <div class="preview-bg"></div>
    <div class="rec-badge"><span class="rec-dot"></span><span id="timecode">00:00:00:00</span></div>
    <div class="lang-badge" id="langbadge"><span class="lang-dot"></span><span id="badgelabel">HI · hindi</span></div>
    <div class="caption-area">
      <div class="caption-text" id="caption">INTEGRIT</div>
    </div>
    <div class="progress-bars" id="pbars"></div>
  </div>

  <div class="timeline-header">
    <span class="th-num">#</span>
    <span class="th-src">SOURCE NAME</span>
    <span class="th-src">SCRIPT</span>
    <span class="th-io">IN/OUT</span>
  </div>
  <div class="tl-rows" id="tlrows"></div>

  <div class="timebar">
    <span>00:00:00</span><span id="midtime">00:00:12</span><span>00:00:24</span>
  </div>
  <div class="clip-row" id="cliprow"></div>
</div>

<script>
const LANGS = [
  {id:'hi',label:'HI · hindi',badge:'HI · hindi',color:'#2ecc71',font:"'Noto Sans Devanagari',sans-serif",chars:['इ','न','ट','ए','ग','र','ि','ट'],pool:['अ','आ','इ','ई','उ','क','ख','ग','ट','त','द','न','प','म','र','ल','व','श','स','ह','ञ','ध','फ','ब','भ']},
  {id:'te',label:'TE · telugu',badge:'TE · telugu',color:'#e74c3c',font:"'Noto Sans Telugu',sans-serif",chars:['ఇ','న','ట','ఎ','గ','ర','ి','ట'],pool:['అ','ఆ','ఇ','ఉ','క','ఖ','గ','ట','త','ద','న','ప','మ','య','ర','ల','వ','శ','స','హ','ఘ','చ','జ','ధ','ఫ']},
  {id:'ta',label:'TA · tamil',badge:'TA · tamil',color:'#a855f7',font:"'Noto Sans Tamil',sans-serif",chars:['இ','ந','ட','எ','க','ர','ி','ட'],pool:['அ','ஆ','இ','உ','க','ங','ச','ட','த','ந','ப','ம','ய','ர','ல','வ','ழ','ள','ற','ன','ஞ','ஐ','ஒ','ஓ','ண']},
  {id:'ml',label:'ML · malayalam',badge:'ML · malayalam',color:'#1abc9c',font:"'Noto Sans Malayalam',sans-serif",chars:['ഇ','ൻ','ട','എ','ഗ','ർ','ി','ട'],pool:['അ','ആ','ഇ','ഉ','ക','ഖ','ഗ','ട','ത','ദ','ന','പ','മ','യ','ര','ല','വ','ശ','സ','ഹ','ഘ','ച','ജ','ധ','ഫ']},
];

const SOURCE = ['I','N','T','E','G','R','I','T'];
const timings = ['00:00-00:00.6','00:00.6-00:01.2','00:01.2-00:01.8','00:01.8-00:02.4'];

// Build progress bars
const pbarsEl = document.getElementById('pbars');
LANGS.forEach((_,i)=>{
  const s = document.createElement('div');
  s.style.flex='1';s.style.height='3px';s.style.borderRadius='2px';s.style.background='#333';s.style.overflow='hidden';
  const f = document.createElement('div');
  f.id=`pb-${i}`;f.style.height='3px';f.style.width='0%';f.style.borderRadius='2px';f.style.background=LANGS[i].color;f.style.transition='width .08s';
  s.appendChild(f);pbarsEl.appendChild(s);
});

// Build timeline rows
const tlrows = document.getElementById('tlrows');
LANGS.forEach((l,i)=>{
  const row = document.createElement('div');
  row.className='tl-row';row.id=`row-${i}`;
  row.innerHTML=`
    <span class="tl-num">${14+i}</span>
    <span class="tl-dot" style="background:${l.color}"></span>
    <span class="tl-t">T</span>
    <span class="tl-word" id="rowword-${i}">${l.id.toUpperCase()}</span>
    <span class="tl-script" id="rowscript-${i}" style="color:${l.color};font-family:${l.font}">·····</span>
    <span class="tl-io">${timings[i]}</span>
  `;
  tlrows.appendChild(row);
});

// Build clip row
const cliprow = document.getElementById('cliprow');
for(let i=0;i<8;i++){
  const c=document.createElement('div');
  c.className='clip';c.id=`clip-${i}`;cliprow.appendChild(c);
}
for(let i=0;i<2;i++){const c=document.createElement('div');c.className='clip dim';cliprow.appendChild(c);}

// State
let currentLangIdx = 0;
let lockedChars = [];
let frameCount = 0;
let decodeInterval = null;
let langInterval = null;
let capInterval = null;

const captionEl = document.getElementById('caption');
const badgeEl = document.getElementById('badgelabel');
const langbadgeEl = document.getElementById('langbadge');
const timecodeEl = document.getElementById('timecode');

function randFrom(arr){return arr[Math.floor(Math.random()*arr.length)];}

function pad2(n){return String(n).padStart(2,'0');}
function formatTC(frame){
  const fps=24,f=frame%fps,s=Math.floor(frame/fps)%60,m=Math.floor(frame/(fps*60))%60,h=Math.floor(frame/(fps*3600));
  return `${pad2(h)}:${pad2(m)}:${pad2(s)}:${pad2(f)}`;
}

function setLangUI(idx){
  const l=LANGS[idx];
  badgeEl.textContent=l.badge;
  langbadgeEl.style.borderColor=l.color;
  langbadgeEl.style.color=l.color;
  langbadgeEl.querySelector('.lang-dot').style.background=l.color;
  // highlight row
  LANGS.forEach((_,i)=>document.getElementById(`row-${i}`).classList.toggle('active-row',i===idx));
  // highlight clip
  for(let i=0;i<8;i++){const c=document.getElementById(`clip-${i}`);c.style.background=l.color;c.classList.toggle('active-clip',i===idx*2||i===idx*2+1);}
}

function renderCaption(langIdx, locked, scramble){
  const l=LANGS[langIdx];
  captionEl.style.fontFamily=l.font;
  let html='';
  for(let i=0;i<SOURCE.length;i++){
    let ch;
    if(i<locked){ch=l.chars[i];html+=`<span style="color:${l.color}">${ch}</span>`;}
    else if(i===locked&&scramble){ch=randFrom(l.pool);html+=`<span style="color:${l.color};opacity:.7">${ch}</span>`;}
    else{ch=SOURCE[i];html+=`<span style="color:#888;font-family:'Share Tech Mono',monospace">${ch}</span>`;}
  }
  captionEl.innerHTML=html;
  // update timeline script preview
  const scriptEl=document.getElementById(`rowscript-${langIdx}`);
  let sc='';
  for(let i=0;i<SOURCE.length;i++){
    if(i<locked) sc+=l.chars[i];
    else sc+='·';
  }
  scriptEl.textContent=sc;
  // progress bar
  document.getElementById(`pb-${langIdx}`).style.width=`${(locked/SOURCE.length)*100}%`;
}

function decodeLang(langIdx, onDone){
  let locked=0;
  let scr=0;
  setLangUI(langIdx);
  if(decodeInterval) clearInterval(decodeInterval);
  decodeInterval=setInterval(()=>{
    scr++;
    renderCaption(langIdx,locked,true);
    if(scr>4){
      scr=0;locked++;
      if(locked>SOURCE.length){
        clearInterval(decodeInterval);
        renderCaption(langIdx,SOURCE.length,false);
        document.getElementById(`pb-${langIdx}`).style.width='100%';
        setTimeout(onDone,700);
      }
    }
  },60);
}

let tcFrame=0;
setInterval(()=>{tcFrame++;timecodeEl.textContent=formatTC(tcFrame);},42);

function runSequence(){
  let i=0;
  function next(){
    if(i>=LANGS.length){
      setTimeout(()=>{
        // reset all
        LANGS.forEach((_,li)=>{
          document.getElementById(`pb-${li}`).style.width='0%';
          document.getElementById(`rowscript-${li}`).textContent='·····';
          document.getElementById(`row-${li}`).classList.remove('active-row');
        });
        captionEl.style.fontFamily="'Inter',sans-serif";
        captionEl.textContent='INTEGRIT';
        i=0;
        setTimeout(next,800);
      },1800);
      return;
    }
    decodeLang(i,()=>{i++;setTimeout(next,300);});
  }
  next();
}

runSequence();
</script>
